{% extends 'base.html' %}
{% block content %}
<div class="header-section">
    <h1>Your Active Battle Plan</h1>
    <p>Follow these daily chunks to reach your goal. <span style="color:#2ecc71;">Revisions</span> are automatically calculated for long term memory retention.</p>
    <div style="margin-top: 15px; display: flex; gap: 10px; justify-content: center;">
        <button id="clearCompletedBtn" class="action-btn" style="background: #ef4444; color: white;">Clear Completed Tasks</button>
        <button id="clearProgressBtn" class="action-btn" style="background: #f59e0b; color: white;">Clear All Progress</button>
    </div>
</div>

<div class="timeline-container" id="scheduleContainer">
    <!-- Dynamically Populated by App.js -->
    <h3 style="text-align:center; color: #555;">Loading your personalized path...</h3>
</div>
{% endblock %}
